name: ResumeMate CI/CD

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY_HOST: 'gitea.brianhan.cc'
  IMAGE_REPOSITORY: 'sacahan/resumemate'
  IMAGE_NAME: ${{ format('{0}/{1}', env.REGISTRY_HOST, env.IMAGE_REPOSITORY) }}

jobs:
  pipeline:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Gitea Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY_HOST }}
          username: ${{ gitea.actor }}
          password: ${{ secrets.DOCKER_LOGIN_TOKEN }}

      - name: Build Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: scripts/Dockerfile
          push: false
          load: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ gitea.sha }}
          platforms: linux/amd64
          provenance: false

      - name: Push Docker Image
        run: |
          docker push ${{ env.IMAGE_NAME }}:latest
          docker push ${{ env.IMAGE_NAME }}:${{ gitea.sha }}

      - name: Release Buildx Cache
        run: |
          docker buildx prune \
            --builder "${{ steps.buildx.outputs.name }}" \
            --all \
            --force || true

      - name: Publish Summary
        run: |
          echo "Docker image published to:"
          echo "  ${{ env.IMAGE_NAME }}:latest"
          echo "Users can install with:"
          echo "  docker login ${{ env.REGISTRY_HOST }}"
          echo "  docker pull ${{ env.IMAGE_NAME }}:latest"
          echo "  ./scripts/docker-run.sh run"
