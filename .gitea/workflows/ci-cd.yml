name: ResumeMate CI/CD

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  IMAGE_NAME: sacahan/resumemate
  DOCKER_TAG: latest

jobs:
  pipeline:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker Image Archive
        uses: docker/build-push-action@v5
        with:
          context: .
          file: scripts/Dockerfile
          push: false
          tags: ${{ env.IMAGE_NAME }}:${{ env.DOCKER_TAG }}
          platforms: linux/amd64
          outputs: type=docker,dest=/tmp/resumemate-image.tar

      - name: Release Buildx Cache
        run: |
          docker buildx prune \
            --builder "${{ steps.buildx.outputs.name }}" \
            --all \
            --force || true

      - name: Deploy
        run: |
          # 生成正式環境 .env.docker
          cat <<EOF > /home/sacahan/codespace/resume-mate/.env.docker
          LITELLM_PROXY_API_BASE="${{ secrets.LITELLM_PROXY_API_BASE }}"
          LITELLM_PROXY_API_KEY="${{ secrets.LITELLM_PROXY_API_KEY }}"
          LITELLM_PROXY_MODEL="${{ secrets.LITELLM_PROXY_MODEL }}"
          EMBEDDING_PROVIDER="${{ secrets.EMBEDDING_PROVIDER || 'local' }}"
          LOCAL_MODEL_NAME="${{ secrets.LOCAL_MODEL_NAME || 'all-MiniLM-L6-v2' }}"
          LOG_CONSOLE_LEVEL="INFO"
          ENVIRONMENT="prod"
          EOF

          # 將映像在真正需要部署前才載入本機 Docker
          docker load --input /tmp/resumemate-image.tar

          # 確保網絡存在
          docker network create sacahan-network || true

          # 執行部署 (使用剛建置的本地 Image)
          chmod +x /home/sacahan/codespace/resume-mate/docker-run.sh
          /home/sacahan/codespace/resume-mate/docker-run.sh run

      - name: Cleanup
        if: always()
        run: |
          rm -f /tmp/resumemate-image.tar
          docker system prune -f
