name: ResumeMate CI/CD

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY_HOST: 'sacahan-ubunto:3333'
  IMAGE_NAME: ${{ format('{0}/{1}', env.REGISTRY_HOST, 'sacahan/resumemate') }}
  DOCKER_TAG: latest

jobs:
  pipeline:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure insecure Docker registry
        run: |
          sudo mkdir -p /etc/docker
          echo '{"insecure-registries": ["${{ env.REGISTRY_HOST }}"]}' | sudo tee /etc/docker/daemon.json
          sudo systemctl restart docker || sudo service docker restart || true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: image=moby/buildkit:master,network=host

      - name: Login to Gitea Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY_HOST }}
          username: ${{ gitea.actor }}
          password: ${{ secrets.DOCKER_LOGIN_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: scripts/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ gitea.sha }}
          platforms: linux/amd64
          provenance: false

      - name: Release Buildx Cache
        run: |
          docker buildx prune \
            --builder "${{ steps.buildx.outputs.name }}" \
            --all \
            --force || true

      - name: Publish Summary
        run: |
          echo "Docker image published to ${{ env.IMAGE_NAME }}:latest"
          echo "Users can install with:"
          echo "  docker login ${{ env.REGISTRY_HOST }}"
          echo "  docker pull ${{ ${{ env.IMAGE_NAME }}:latest"
          echo "  ./scripts/docker-run.sh run"

      - name: Cleanup
        if: always()
        run: |
          docker system prune -f
