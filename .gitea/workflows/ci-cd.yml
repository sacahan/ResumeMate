name: ResumeMate CI/CD

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY_NETWORK: 'sacahan-network'
  INTERNAL_REGISTRY_HOST: 'gitea-server:3000'
  PUBLIC_REGISTRY_HOST: 'sacahan-ubunto:3333'
  IMAGE_REPOSITORY: 'sacahan/resumemate'
  INTERNAL_IMAGE_NAME: ${{ format('{0}/{1}', env.INTERNAL_REGISTRY_HOST, env.IMAGE_REPOSITORY) }}
  PUBLIC_IMAGE_NAME: ${{ format('{0}/{1}', env.PUBLIC_REGISTRY_HOST, env.IMAGE_REPOSITORY) }}
  DOCKER_CONFIG: ${{ runner.temp }}/.docker

jobs:
  pipeline:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Verify registry reachability from runner
        run: |
          python - <<'PY'
          import os
          import socket

          host, port = os.environ["INTERNAL_REGISTRY_HOST"].split(":", 1)
          port = int(port)

          print(f"Resolving {host}...")
          print(socket.gethostbyname_ex(host))

          with socket.create_connection((host, port), timeout=10):
              print(f"TCP connectivity to {host}:{port} verified")
          PY
          status_code="$(curl --silent --show-error --output /dev/null \
            --write-out '%{http_code}' \
            --retry 5 \
            --retry-connrefused \
            --retry-delay 3 \
            "http://${{ env.INTERNAL_REGISTRY_HOST }}/v2/")"
          if [ "$status_code" != "200" ] && [ "$status_code" != "401" ]; then
            echo "Unexpected registry probe status: $status_code"
            exit 1
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: |
            image=moby/buildkit:master
            network=${{ env.REGISTRY_NETWORK }}
          config-inline: |
            [registry."${{ env.INTERNAL_REGISTRY_HOST }}"]
              http = true
              insecure = true

      - name: Verify registry reachability from builder daemon
        run: |
          docker run --rm \
            --network "${{ env.REGISTRY_NETWORK }}" \
            curlimages/curl:8.12.1 \
            --silent --show-error --output /dev/null \
            --write-out '%{http_code}' \
            --retry 5 \
            --retry-connrefused \
            --retry-delay 3 \
            "http://${{ env.INTERNAL_REGISTRY_HOST }}/v2/" \
            | python -c 'import sys; code = sys.stdin.read().strip(); raise SystemExit(0 if code in {"200", "401"} else 1)'

      - name: Prepare Docker auth for Gitea Registry
        env:
          GITEA_ACTOR: ${{ gitea.actor }}
          DOCKER_LOGIN_TOKEN: ${{ secrets.DOCKER_LOGIN_TOKEN }}
        run: |
          python - <<'PY'
          import base64
          import json
          import os
          from pathlib import Path

          registry = os.environ["INTERNAL_REGISTRY_HOST"]
          username = os.environ["GITEA_ACTOR"]
          password = os.environ["DOCKER_LOGIN_TOKEN"]
          docker_config_dir = Path(os.environ["DOCKER_CONFIG"])
          docker_config_dir.mkdir(parents=True, exist_ok=True)

          auth = base64.b64encode(f"{username}:{password}".encode("utf-8")).decode("ascii")
          config = {
              "auths": {
                  registry: {
                      "auth": auth,
                  }
              }
          }
          config_path = docker_config_dir / "config.json"
          config_path.write_text(json.dumps(config), encoding="utf-8")
          print(f"Wrote Docker auth config to {config_path}")
          PY

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: scripts/Dockerfile
          push: true
          tags: |
            ${{ env.INTERNAL_IMAGE_NAME }}:latest
            ${{ env.INTERNAL_IMAGE_NAME }}:${{ gitea.sha }}
          platforms: linux/amd64
          provenance: false

      - name: Release Buildx Cache
        run: |
          docker buildx prune \
            --builder "${{ steps.buildx.outputs.name }}" \
            --all \
            --force || true

      - name: Publish Summary
        run: |
          echo "Docker image published via internal registry path:"
          echo "  ${{ env.INTERNAL_IMAGE_NAME }}:latest"
          echo "External consumers should pull from the published host address:"
          echo "  docker login ${{ env.PUBLIC_REGISTRY_HOST }}"
          echo "  docker pull ${{ env.PUBLIC_IMAGE_NAME }}:latest"
          echo "  ./scripts/docker-run.sh run"

      - name: Cleanup
        if: always()
        run: |
          rm -rf "${{ env.DOCKER_CONFIG }}"
          docker system prune -f
