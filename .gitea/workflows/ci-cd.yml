name: ResumeMate CI/CD

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  IMAGE_NAME: ${{ vars.GITEA_REGISTRY_IMAGE || format('{0}/{1}', vars.GITEA_REGISTRY, 'sacahan/resumemate') }}
  REGISTRY_HOST: ${{ vars.GITEA_REGISTRY }}
  DOCKER_TAG: latest

jobs:
  pipeline:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate BuildKit Config
        run: |
          cat <<EOF > /tmp/buildkitd.toml
          [registry."${{ env.REGISTRY_HOST }}"]
            http = true
            insecure = true
          EOF

      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@v3
        with:
          buildkitd-config: /tmp/buildkitd.toml

      - name: Login to Gitea Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY_HOST }}
          username: ${{ gitea.actor }}
          password: ${{ secrets.DOCKER_LOGIN_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: scripts/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY_HOST }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY_HOST }}/${{ env.IMAGE_NAME }}:${{ gitea.sha }}
          platforms: linux/amd64
          provenance: false

      - name: Release Buildx Cache
        run: |
          docker buildx prune \
            --builder "${{ steps.buildx.outputs.name }}" \
            --all \
            --force || true

      - name: Publish Summary
        run: |
          echo "Docker image published to ${{ env.REGISTRY_HOST }}/${{ env.IMAGE_NAME }}:latest"
          echo "Users can install with:"
          echo "  docker login ${{ env.REGISTRY_HOST }}"
          echo "  docker pull ${{ env.REGISTRY_HOST }}/${{ env.IMAGE_NAME }}:latest"
          echo "  ./scripts/docker-run.sh run"

      - name: Cleanup
        if: always()
        run: |
          docker system prune -f
